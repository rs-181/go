<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Websites</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <iframe id="display" src=""></iframe>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Yahan apni Firebase Config daalna (Step 2 mein milegi)
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
        };
        firebase.initializeApp(firebaseConfig);

        // URL se domain nikalna (e.g. /rs.store -> rs_store)
        let path = window.location.pathname.split("/").pop().replace(".", "_");

        if(!path) {
            document.body.innerHTML = "<h1>Welcome to Our Site</h1>";
        } else {
            firebase.database().ref('sites/' + path).once('value').then((snapshot) => {
                const targetUrl = snapshot.val();
                if (targetUrl) {
                    document.getElementById('display').src = targetUrl;
                } else {
                    document.body.innerHTML = "<h1>Error 404 : Link not found! Please Check Your Link. Thanks for Visiting our Site 😊</h1>";
                }
            });
        }
    </script>
</body>
</html>
